services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:dev
    ports:
      - "${API_PORT:-3050}:3050"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3050}
      # Always use Compose service DNS + internal port inside the bridge network:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-ledger}
      DB_USER: ${POSTGRES_USER:-ledger}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ledger}
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ledger}
      POSTGRES_USER: ${POSTGRES_USER:-ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledger}
    ports:
      - "${HOST_DB_PORT:-5460}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledger} -d ${POSTGRES_DB:-ledger}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    profiles: ["test"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledger_test
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "${HOST_DB_TEST_PORT:-5461}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  postgres_test_data:
  api_node_modules:
